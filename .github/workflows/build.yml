name: Build

on:
  push:
  pull_request:
  workflow_dispatch:
  repository_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: flash-player-host-linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: flash-player-host-windows
          - os: windows-latest
            target: i686-pc-windows-msvc
            artifact: flash-player-host-windows-32
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: flash-player-host-macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --profile release-lto --package player-web --target ${{ matrix.target }}

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release-lto/flash-player-host

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release-lto/flash-player-host.exe

  web-extension:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install tools
        run: npm install -g crx web-ext

      - name: Prepare extension directory
        run: |
          cp -r web-extension ext-stage
          rm -f ext-stage/install-host.sh ext-stage/install-host.py

      # ---- Unsigned artifacts (always) ----

      - name: Build unsigned ZIP & XPI (web-ext)
        run: |
          web-ext build --source-dir ext-stage --artifacts-dir . --filename web-extension.zip --overwrite-dest
          cp web-extension.zip web-extension.xpi

      - name: Build unsigned CRX
        run: crx pack ext-stage -o web-extension-unsigned.crx

      - name: Upload unsigned ZIP
        uses: actions/upload-artifact@v6
        with:
          name: web-extension
          path: web-extension.zip

      - name: Upload XPI
        uses: actions/upload-artifact@v6
        with:
          name: web-extension-xpi
          path: web-extension.xpi

      - name: Upload unsigned CRX
        uses: actions/upload-artifact@v6
        with:
          name: web-extension-unsigned-crx
          path: web-extension-unsigned.crx

      # ---- Signed artifacts (master branch only) ----

      - name: Write signing key
        if: github.ref == 'refs/heads/master'
        run: echo "${{ secrets.EXTENSION_PEM }}" > /tmp/extension.pem

      - name: Build signed CRX
        if: github.ref == 'refs/heads/master'
        run: crx pack ext-stage -p /tmp/extension.pem -o web-extension-signed.crx

      - name: Clean up signing key
        if: always()
        run: rm -f /tmp/extension.pem

      - name: Upload signed CRX
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v6
        with:
          name: web-extension-signed-crx
          path: web-extension-signed.crx
