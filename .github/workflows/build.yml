name: Build

on:
  push:
  pull_request:
  workflow_dispatch:
  repository_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: flash-player-host-linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: flash-player-host-windows
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: flash-player-host-macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --profile release-lto --package player-web --target ${{ matrix.target }}

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release-lto/flash-player-host

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release-lto/flash-player-host.exe

  web-extension:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Remove install-host scripts
        run: |
          rm web-extension/install-host.sh
          rm web-extension/install-host.py
      - name: Create web-extension zip
        run: |
          cd web-extension
          zip -r ../web-extension.zip .

      - name: Upload web-extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-extension
          path: web-extension.zip
